# ============================================================
# Weave Agent Configuration
# Environment switching via APP_ENV variable
# ============================================================

local:
  app:
    host: 127.0.0.1
    port: 8080
    path: /datafabric-weave-agent
    a2a_url: http://127.0.0.1:8080/datafabric-weave-agent
    default_persona: weave-base     # weave-base | weave-analytics (FAB-2101)
  llm:
    provider: gemini              # gemini | anthropic | openai | kimi
    model: gemini-2.5-flash
    temperature: 0.0
    anthropic:
      model: claude-sonnet-4-20250514
    openai:
      model: gpt-4o
    kimi:
      api_base: https://api.moonshot.cn/v1
      model: moonshot-v1-128k
  vertexai:
    google_application_credentials: "C:\\Users\\45195900\\Hadoop\\Artifacts\\keys\\fabric\\rinalds-hydra\\hsbc-11597561-hydra-dev-7d699857da18.json"
    location: europe-west1
    project: hsbc-11597561-hydra-dev
  proxy:
    cloud_proxy: http://googleapis-dev.gcp.cloud.uk.hsbc:3128
    no_proxy: .hsbc,127.0.0.1,localhost
  asset_registry_mcp:
    transport: streamable-http
    url: http://127.0.0.1:8083/datafabric-asset-registry-mcp
    headers:
      Authorization: ""
  knowledge_registry_mcp:
    transport: streamable-http
    url: http://127.0.0.1:8082/datafabric-docusaurus-mcp
    headers:
      Authorization: ""
  # session_db_url: "postgresql+asyncpg://user:pass@localhost:5432/weave_sessions"

  # Analytics persona (FAB-2101). Active only when persona=weave-analytics.
  # Secret: APP_VECTOR_STORES__DB_IAM_PASS set via env var at runtime (D14).
  vector_stores:
    db_name: weave-dev
    db_iam_user: fabric-ai@hsbc-20016297-datafabric-dev.iam
    db_host: 10.98.45.217
    db_port: 5432
    db_iam_pass:

